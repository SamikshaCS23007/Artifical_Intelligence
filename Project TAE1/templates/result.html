<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:12px;
            width:350px;
            text-align:center;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        h1{
            color:#333;
            margin-bottom:20px;
        }

        .result{
            font-size:20px;
            font-weight:bold;
            color:#2c7be5;
            margin:20px 0;
        }

        a{
            text-decoration:none;
            background:#4facfe;
            color:white;
            padding:10px 20px;
            border-radius:6px;
        }

        a:hover{
            background:#00c6ff;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Disease Prediction Result</h1>

<div class="result">
    {{ result }}
</div>

<a href="/">Check Again</a>

</div>

</body>
</html>
